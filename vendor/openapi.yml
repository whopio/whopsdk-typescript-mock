components:
  schemas:
    Company:
      x-resource-prefix: "biz_"
      type: object
      required:
        - title
      properties:
        id:
          type: string
        affiliate_instructions:
          type: string
        created_at:
          type: string
        description:
          type: string
        featured_affiliate_product:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
        logo:
          type: object
          properties:
            url:
              type: string
        member_count:
          type: integer
        metadata:
          type: object
        owner_user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            username:
              type: string
        published_reviews_count:
          type: integer
        route:
          type: string
        send_customer_emails:
          type: boolean
        social_links:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              url:
                type: string
              website:
                type: string
        target_audience:
          type: string
        title:
          type: string
        updated_at:
          type: string
        verified:
          type: boolean
    CompanyList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Company"
        page_info:
          type: object
    Member:
      x-resource-prefix: "mb_"
      type: object
      properties:
        id:
          type: string
        access_level:
          type: string
          enum: ["no_access", "admin", "customer"]
        company:
          $ref: "#/components/schemas/Company"
        company_id:
          type: string
        company_token_balance:
          type: number
        created_at:
          type: string
        joined_at:
          type: string
        most_recent_action:
          type: string
          enum: ["canceling", "churned", "finished_split_pay", "paused", "paid_subscriber", "paid_once", "expiring", "joined", "drafted", "left", "trialing", "pending_entry", "renewing", "past_due"]
        most_recent_action_at:
          type: string
        phone:
          type: string
        status:
          type: string
          enum: ["drafted", "joined", "left"]
        updated_at:
          type: string
        usd_total_spent:
          type: number
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string
            username:
              type: string
    MemberList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Member"
        page_info:
          type: object
    Membership:
      x-resource-prefix: "mem_"
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: ["active", "paused", "canceled"]
        created_at:
          type: string
        company_id:
          type: string
        company:
          $ref: "#/components/schemas/Company"
        metadata:
          type: object
    MembershipList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Membership"
        page_info:
          type: object
    Payment:
      x-resource-prefix: "pay_"
      type: object
      required:
        - company_id
        - member_id
      properties:
        company_id:
          type: string
        id:
          type: string
        member_id:
          type: string
        currency:
          type: string
        amount:
          type: number
        payment_method_id:
          type: string
        payment_method:
          $ref: "#/components/schemas/PaymentMethod"
        plan_id:
          type: string
        plan:
          $ref: "#/components/schemas/Plan"
        product_id:
          type: string
        product:
          $ref: "#/components/schemas/Product"
        metadata:
          type: object
        status:
          type: string
          enum: ["open", "paid", "void"]
        substatus:
          type: string
          enum: ["pending", "succeeded", "failed", "partially_refunded", "refunded"]
        refunded_at:
          type: string
    PaymentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
        page_info:
          type: object
    PaymentFee:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
        name:
          type: string
        type:
          type: string
    PaymentFeeList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PaymentFee"
        page_info:
          type: object
    Event:
      x-resource-prefix: "evt_"
      type: object
      properties:
        id:
          type: string
        api_version:
          type: string
        type:
          type: string
        timestamp:
          type: string
        created_at:
          type: string
        company_id:
          type: string
        data:
          type: object
          properties:
            id:
              type: string
            status:
              type: string
    Webhook:
      x-resource-prefix: "whk_"
      type: object
      properties:
        id:
          type: string
        api_version:
          type: string
          enum: ["v1"]
        child_resource_events:
          type: boolean
        created_at:
          type: string
        enabled:
          type: boolean
